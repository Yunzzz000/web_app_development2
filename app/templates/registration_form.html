{% extends "base.html" %}

{% block title %}報名活動 - {{ event.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('event.list_events') }}">活動</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('event.detail', id=event.id) }}">{{ event.title }}</a></li>
                <li class="breadcrumb-item active">報名</li>
            </ol>
        </nav>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="card-title fw-bold mb-2">活動報名</h2>
                <p class="text-muted mb-4">請填寫以下資訊以完成報名：<strong>{{ event.title }}</strong></p>

                <form action="{{ url_for('registration.register', id=event.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="您的姓名">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="example@email.com">
                        <div class="form-text">我們將寄送報名確認信至此信箱。</div>
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="form-label">電話 <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="phone" name="phone" required placeholder="0912-345-678">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">確認報名</button>
                        <a href="{{ url_for('event.detail', id=event.id) }}" class="btn btn-link">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
