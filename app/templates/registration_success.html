{% extends "base.html" %}

{% block title %}報名成功 - 活動報名平台{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-check-circle-fill text-success" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h1 class="fw-bold mb-3">報名成功！</h1>
        <p class="lead mb-4">感謝您的參與，我們已收到您的報名資訊。</p>
        
        {% if event %}
        <div class="card mb-4 border-0 bg-light">
            <div class="card-body">
                <h5 class="fw-bold">{{ event.title }}</h5>
                <p class="mb-0 text-muted">📍 {{ event.location }}</p>
                <p class="mb-0 text-muted">📅 {{ event.event_date.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>
        {% endif %}

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg px-4 gap-3">回到首頁</a>
            <a href="{{ url_for('event.list_events') }}" class="btn btn-outline-secondary btn-lg px-4">查看更多活動</a>
        </div>
    </div>
</div>
{% endblock %}
